    <!--
      NOTE: TikZJax used to be loaded here at the top level, but TikZJax
      v1 only scans for `<script type="text/tikz">` tags on its own
      DOMContentLoaded — there's no MutationObserver or public process
      API, so dynamically-injected React content never gets rendered.
      We now embed TikZJax inside each per-figure iframe instead (see
      components/solverx/MessageBlock.jsx → TikzFigure). The iframe has
      an independent document lifecycle so TikZJax fires correctly
      every time. Browsers cache the CDN bundle across iframes.
    -->

  </head>
